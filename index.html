<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./src/css/reset.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/variable.css">
  <link rel="stylesheet" href="./src/css/responsive.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Base Apparel coming soon page</title>
</head>
<body>
  <div class="container">
    <header class="container-logo" id="logo">
      <img class="logo-img" src="./images/logo.svg" alt="logo base apparel">
    </header>

    <img class="hero-tablet" src="./images/hero-mobile.jpg" alt="">

    <main class="container-info">
      <section class="landing-page-info">
        <h1 class="header-info">We're <span class="comingsoon">coming soon</span></h1>
        <p class="subtext-info">Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>
      </section>

      <section class="user-info">
        <form class="container-form" id="info-form" novalidate>
          <input class="form-input" id="info-input" type="text" placeholder="Email Address" pattern="[^\s@]+@[^\s@]+\.[^\s@]+" required>
          <button class="form-btn" id="submit-btn" type="submit">
            <img src="./images/icon-arrow.svg" alt="arrow button">
          </button>
          <img class="error-icon" src="./images/icon-error.svg" alt="error icon">
        </form>
        <p class="error-msg">Please provide a valid email</p>
      </section>
    </main>

    <footer class="attribution">
      <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Tiago de Gregori</a>.</p>
    </footer>
  </div>

</body>
<script src="./src/js/script.js"></script>
</html>
